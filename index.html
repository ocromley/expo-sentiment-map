<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Expo Mood Map</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #1a1a2e; color: #e94560; padding: 20px; }
        #start-btn { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; border-radius: 50px; border: none; background: #e94560; color: white; transition: 0.3s; }
        #start-btn:hover { background: #0f3460; }
        .chart-container { width: 80%; max-width: 600px; margin: 30px auto; background: white; padding: 20px; border-radius: 15px; }
        #status { color: #4ecca3; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🎤 Expo Mood Map</h1>
    <p>Tell the AI how your day is going!</p>
    
    <button id="start-btn">Start Talking</button>
    <p id="status">Ready...</p>
    
    <div class="chart-container">
        <canvas id="moodChart"></canvas>
    </div>

    <script>
        const btn = document.getElementById('start-btn');
        const status = document.getElementById('status');
        
        // Setup Chart
        const ctx = document.getElementById('moodChart').getContext('2d');
        const moodChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Happy/Good', 'Neutral', 'Bored/Bad'],
                datasets: [{
                    label: '# of Responses',
                    data: [0, 0, 0],
                    backgroundColor: ['#4ecca3', '#fca311', '#e94560']
                }]
            }
        });

        // Speech Recognition Logic
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();

        btn.onclick = () => {
            recognition.start();
            status.innerText = "Listening...";
        };

        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript.toLowerCase();
            status.innerText = `You said: "${text}"`;
            
            // Simple logic to update chart
            if (text.includes("great") || text.includes("good") || text.includes("happy")) {
                moodChart.data.datasets[0].data[0]++;
            } else if (text.includes("bad") || text.includes("sad") || text.includes("boring")) {
                moodChart.data.datasets[0].data[2]++;
            } else {
                moodChart.data.datasets[0].data[1]++;
            }
            moodChart.update();
        };
    </script>
</body>
</html>
